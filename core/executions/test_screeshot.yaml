!!python/object:core.execution.Execution
execution: test_screeshot
list:
- !!python/object:core.task.Task
  input: '{"url":"http://www.baidu.com"}'
  type: GO_TO_PAGE
- !!python/object:core.task.Task
  input: '{"data_key":"screeshot_xpath","format":"png","wait":3,"xpath":"//*[@id=\"s_lg_img\"]","file_path":"{self.get_tdir()}/test_screenshot/screenshotbaidu_xpath.png"}'
  type: SCREENSHOT
- !!python/object:core.task.Task
  input: '{"data_key":"screeshot_fullscreen","format":"png","wait":3,"file_path":"{self.get_tdir()}/test_screenshot/screenshotbaidu.png"}'
  type: SCREENSHOT
- !!python/object:core.task.Task
  input: '{"crop":"800|>100|>3000|>800","show":"yes","data_key":"screeshot_crop","format":"png","wait":3,"file_path":"{self.get_tdir()}/test_screenshot/screenshotbaidu_crop.png"}'
  type: SCREENSHOT
loops: []
